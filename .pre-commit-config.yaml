# Pre-commit hooks. Install once:  uv run pre-commit install
# Run on all files:               uv run pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff          # lint (autofix)
        args: [--fix, --exclude, notebooks/]
      - id: ruff-format   # format
        args: [--exclude, notebooks/]

  - repo: local
    hooks:
      - id: basedpyright       # type check (config in [tool.basedpyright])
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements   # catches stray breakpoint()/pdb
